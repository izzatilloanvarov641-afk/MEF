<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEF — Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06080f;--navy:#0a0f1c;--card:#0d1220;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#e4e9f5;--text2:#6b7589;--text3:#2e3547;--gold:#c8a84a;--green:#10b981;--red:#ef4444;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--display:'Bebas Neue',sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
nav{background:rgba(6,8,15,.9);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;gap:12px}
.nav-brand{font-family:var(--display);font-size:20px;color:var(--gold);text-decoration:none;letter-spacing:.1em}
.spacer{flex:1}
.nav-link{font-size:13px;color:var(--text2);text-decoration:none;padding:6px 12px;border-radius:6px}
.nav-link:hover{color:var(--text)}
main{max-width:800px;margin:0 auto;padding:48px 24px}
.page-title{font-family:var(--display);font-size:52px;color:var(--gold);letter-spacing:.04em;margin-bottom:6px}
.page-sub{font-size:14px;color:var(--text2);margin-bottom:32px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;padding:12px 16px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--border);font-weight:400}
tbody td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2)}
tbody tr:last-child td{border:none}
tbody tr:hover{background:rgba(255,255,255,.02)}
.rank{font-family:var(--mono);color:var(--text3)}
.username{font-weight:500;color:var(--text)}
.mono{font-family:var(--mono)}
.medal{font-size:16px}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-brand">MEF</a>
  <div class="spacer"></div>
  <a href="/" class="nav-link">← Back to home</a>
</nav>
<main>
  <div class="page-title">Leaderboard</div>
  <div class="page-sub">Global rankings — all time. Ranked by wins then best Economic Health Score.</div>
  <div class="card">
    <table>
      <thead><tr><th>Rank</th><th>Player</th><th>Games</th><th>Wins</th><th>Win rate</th><th>Best EHS</th><th>Best growth</th></tr></thead>
      <tbody id="lbBody"><tr><td colspan="7" style="text-align:center;color:var(--text3);padding:24px">Loading…</td></tr></tbody>
    </table>
  </div>
</main>
<script>
const medals=['🥇','🥈','🥉'];
fetch('/api/leaderboard').then(r=>r.json()).then(data=>{
  const tbody=document.getElementById('lbBody');
  if(!data.leaderboard?.length){tbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:24px">No games played yet.</td></tr>';return;}
  tbody.innerHTML=data.leaderboard.map((u,i)=>`<tr>
    <td><span class="rank">${medals[i]||'#'+(i+1)}</span></td>
    <td><span class="username">${u.username}</span></td>
    <td class="mono">${u.games_played}</td>
    <td class="mono">${u.games_won}</td>
    <td class="mono">${u.win_rate}%</td>
    <td class="mono" style="color:${u.best_ehs>60?'var(--green)':'var(--text2)'}">${u.best_ehs||'—'}</td>
    <td class="mono" style="color:${u.best_growth>5?'var(--green)':'var(--text2)'}">${u.best_growth?'+'+u.best_growth+'%':'—'}</td>
  </tr>`).join('');
});
</script>
</body>
</html>
